<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#1D4ED8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAMS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="stylesheet" href="styles.css">
<title>CAMS試験対策</title>
</head>
<body>
<div id="app">
  <!-- ローディング画面 -->
  <div id="loading" class="loading-screen">
    <div class="loading-content">
      <div class="logo-icon">⚖️</div>
      <h1>CAMS試験対策</h1>
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="main-app" class="hidden">
    <!-- ヘッダー -->
    <header id="header">
      <div class="header-left">
        <button class="icon-btn" id="back-btn">←</button>
        <h1 id="page-title">CAMS</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="theme-toggle">🌙</button>
        <button class="icon-btn" id="settings-btn">⚙</button>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main id="content"></main>

    <!-- 下部タブナビ -->
    <nav id="tab-nav">
      <button class="tab-btn active" data-tab="home">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">ホーム</span>
      </button>
      <button class="tab-btn" data-tab="practice">
        <span class="tab-icon">📝</span>
        <span class="tab-label">演習</span>
      </button>
      <button class="tab-btn" data-tab="textbook">
        <span class="tab-icon">📖</span>
        <span class="tab-label">教科書</span>
      </button>
      <button class="tab-btn" data-tab="exam">
        <span class="tab-icon">🎯</span>
        <span class="tab-label">試験</span>
      </button>
      <button class="tab-btn" data-tab="review">
        <span class="tab-icon">🔁</span>
        <span class="tab-label">復習</span>
      </button>
      <button class="tab-btn" data-tab="stats">
        <span class="tab-icon">📊</span>
        <span class="tab-label">統計</span>
      </button>
    </nav>
  </div>

  <!-- モーダル -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div id="modal-body"></div>
      <button class="btn-primary" id="modal-close">閉じる</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
// PWAサービスワーカー登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW failed', err));
  });
}
</script>
</body>
</html>
